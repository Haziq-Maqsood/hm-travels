<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${title}">Schedule Trips</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #ecf0f1; }
    .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; }
    .sidebar h2 { text-align: center; padding: 20px 0; margin: 0; border-bottom: 1px solid #34495e; }
    .sidebar a { color: white; padding: 15px 20px; text-decoration: none; border-bottom: 1px solid #34495e; transition: 0.3s; }
    .sidebar a:hover { background-color: #34495e; }
    .main-content { flex: 1; padding: 30px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }

    /* Table & Search Styles */
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 30px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #8e44ad; color: white; }
    .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }

    /* Form Styles */
    .form-container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 60%; margin: 0 auto; }
    .form-container h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; text-align: center; }
    .form-container input, .form-container select { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .btn-submit { background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }

    /* TABS CSS */
    .tab-header { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .tab-btn { padding: 10px 20px; cursor: pointer; background: none; border: none; font-size: 16px; font-weight: bold; color: #7f8c8d; outline: none; }
    .tab-btn.active { color: #8e44ad; border-bottom: 3px solid #8e44ad; margin-bottom: -2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>HM Travels</h2>
  <a href="/dashboard">Dashboard</a>
  <a href="/routes">Manage Routes</a>
  <a href="/vehicles">Manage Vehicles</a>
  <a href="/trips">Schedule Trips</a>
  <a href="/bookings">View Bookings</a>
  <a href="/customers">Manage Customers</a>
</div>

<div class="main-content">
  <div class="header"><h1>Trip Management</h1></div>
  <div th:if="${success}" class="alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert-error" th:text="${error}"></div>
  <div class="tab-header">
    <button class="tab-btn active" onclick="switchTab('tripTab', this)">Active Schedule</button>
    <button class="tab-btn" onclick="switchTab('addTab', this)">New Journey Workspace</button>
  </div>

  <div id="tripTab" class="tab-content active">
    <input type="text" id="tripSearch" class="search-box" placeholder="Search by Route, Vehicle, or Driver...">

    <table>
      <thead>
      <tr>
        <th>Trip ID</th>
        <th>Route</th>
        <th>Vehicle Assigned</th>
        <th>Departure Time</th>
        <th>Driver/Captain</th>
      </tr>
      </thead>
      <tbody id="tripTableBody">
      <tr th:each="trip : ${trips}">
        <td th:text="${trip.id}"></td>
        <td th:text="${trip.route.routeName} + ' (' + ${trip.route.departureCity} + ' to ' + ${trip.route.destinationCity} + ')'"></td>
        <td th:text="${trip.vehicle.vehicleName} + ' [' + ${trip.vehicle.vehicleNo} + ']'"></td>
        <td th:text="${#temporals.format(trip.departureTime, 'dd-MM-yyyy HH:mm')}"></td>
        <td th:text="${trip.driverName}"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <div id="addTab" class="tab-content">
    <div class="form-container">
      <h3>Schedule a New Journey</h3>
      <form th:action="@{/trips/add}" method="post">

        <label><strong>1. Select Route:</strong></label>
        <select name="routeId" required>
          <option value="" disabled selected>-- Select a Route --</option>
          <option th:each="route : ${routes}" th:value="${route.id}" th:text="${route.routeName} + ' (' + ${route.departureCity} + ' to ' + ${route.destinationCity} + ')'"></option>
        </select>

        <label><strong>2. Assign Vehicle:</strong></label>
        <select name="vehicleId" required>
          <option value="" disabled selected>-- Select a Vehicle --</option>
          <option th:each="vehicle : ${vehicles}" th:value="${vehicle.id}" th:text="${vehicle.vehicleName} + ' (' + ${vehicle.vehicleType} + ' - ' + ${vehicle.capacity} + ' seats)'"></option>
        </select>

        <label><strong>3. Departure Date & Time:</strong></label>
        <input type="datetime-local" id="departureInput" name="departureTime" required>

        <label><strong>4. Assigned Driver / Captain Name:</strong></label>
        <input type="text" name="driverName" required placeholder="e.g., Ali Khan">

        <button type="submit" class="btn-submit">Publish Schedule</button>
      </form>
    </div>
  </div>
</div>

<script>
  // Tab Switching Logic
  function switchTab(tabId, element) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    element.classList.add('active');
  }

  // Live Search for Trips
  document.getElementById('tripSearch').addEventListener('keyup', function() {
    const searchValue = this.value.toLowerCase();
    const rows = document.getElementById('tripTableBody').getElementsByTagName('tr');

    for (let row of rows) {
      const route = row.cells[1].textContent.toLowerCase();
      const vehicle = row.cells[2].textContent.toLowerCase();
      const driver = row.cells[4].textContent.toLowerCase();

      if (route.includes(searchValue) || vehicle.includes(searchValue) || driver.includes(searchValue)) {
        row.style.display = "";
      } else {
        row.style.display = "none";
      }
    }
  });

  // Prevent scheduling past trips in the workspace
  document.addEventListener('DOMContentLoaded', function() {
    const departureInput = document.getElementById('departureInput');
    const now = new Date();
    // Format to yyyy-MM-ddThh:mm for datetime-local
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');

    departureInput.setAttribute('min', `${year}-${month}-${day}T${hours}:${minutes}`);
  });
</script>
</body>
</html>
