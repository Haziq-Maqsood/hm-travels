<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Agency Login - HM Travels</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-container h2 { color: #2c3e50; margin-bottom: 20px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 10px; }
        .success { color: #2ecc71; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>HM Travels Admin</h2>

    <div th:if="${param.error}" class="error">Invalid username and password.</div>
    <div th:if="${param.logout}" class="success">You have been securely logged out.</div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required autofocus />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login to Portal</button>
    </form>
</div>

</body>
</html>
