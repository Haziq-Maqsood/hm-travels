<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM Travels | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --sidebar-bg: #1e293b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-body); 
            color: var(--text-main);
        }

        /* Sidebar Styling */
        .sidebar { 
            width: 260px; 
            background-color: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .sidebar h2 { 
            text-align: center; 
            padding: 25px 0; 
            margin: 0; 
            font-size: 20px;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
        }
        .sidebar-menu { flex: 1; padding: 20px 0; }
        .sidebar a { 
            color: #cbd5e1; 
            padding: 12px 25px; 
            text-decoration: none; 
            transition: all 0.2s; 
            cursor: pointer; 
            display: block; 
            font-size: 15px;
            border-left: 4px solid transparent;
        }
        .sidebar a:hover { 
            background-color: rgba(255,255,255,0.1); 
            color: white;
            border-left: 4px solid var(--primary);
        }

        /* Seat Map Styles */
        .seat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding: 5px; }
        .seat { padding: 10px; text-align: center; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .seat-available { background-color: #ecf0f1; border-color: #bdc3c7; color: #2c3e50; }
        .seat-available:hover { background-color: #d5dbdb; }
        .seat-booked { background-color: #e74c3c; color: white; cursor: not-allowed; opacity: 0.7; }
        .seat-selected { background-color: #2ecc71; color: white; border-color: #27ae60; transform: scale(1.05); }

        /* Layout */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { margin: 0; font-size: 28px; font-weight: 600; color: var(--text-main); }

        /* Modern Table */
        .table-container { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f1f5f9; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 12px; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8fafc; }

        /* Inputs & Controls */
        .search-box { 
            width: 100%; padding: 12px 18px; margin-bottom: 20px; 
            border: 1px solid var(--border); border-radius: 8px; 
            font-size: 15px; outline: none; transition: border 0.2s;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Modern Form */
        .form-container { 
            background: var(--white); padding: 35px; border-radius: 16px; 
            box-shadow: var(--shadow); max-width: 650px; margin: 0 auto; 
            border: 1px solid var(--border);
        }
        .form-container h3 { margin-top: 0; color: var(--text-main); margin-bottom: 25px; text-align: center; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--text-muted); }
        input, select { 
            width: 100%; padding: 11px; margin-bottom: 20px; 
            border: 1px solid var(--border); border-radius: 6px; 
            font-size: 14px; box-sizing: border-box; background: #fafafa;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); background: white; }

        /* Buttons */
        .btn-submit { 
            background-color: var(--primary); color: white; padding: 14px; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-size: 16px; font-weight: 600; width: 100%; transition: background 0.2s;
        }
        .btn-submit:hover { background-color: var(--primary-hover); }
        
        /* Cancel & Print Buttons */
        .btn-cancel { 
            background-color: #ef4444; color: white; padding: 8px 12px; 
            border: none; border-radius: 6px; cursor: pointer; 
            font-size: 13px; font-weight: 600; transition: background 0.2s; 
        }
        .btn-cancel:hover { background-color: #dc2626; }
        
        .btn-print-sm { 
            background-color: #3b82f6; color: white; padding: 8px 12px; 
            border: none; border-radius: 6px; cursor: pointer; text-decoration: none;
            font-size: 13px; font-weight: 600; transition: background 0.2s; margin-right: 8px; display: inline-block;
        }
        .btn-print-sm:hover { background-color: #2563eb; }

        /* Tabs UI */
        .tab-header { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { 
            padding: 10px 20px; cursor: pointer; background: #e2e8f0; border: none; 
            border-radius: 6px; font-size: 14px; font-weight: 600; color: var(--text-muted); transition: all 0.2s;
        }
        .tab-btn.active { background-color: var(--primary); color: white; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        /* Status Badges */
        .status-badge { 
            background-color: #dcfce7; color: #166534; padding: 4px 10px; 
            border-radius: 999px; font-size: 12px; font-weight: 600; 
        }

        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 50px; border-radius: 20px; width: 380px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 30px;">HM Travels Admin</h2>
            <label>Username</label>
            <input type="text" id="login_user" placeholder="admin">
            <label>Password</label>
            <input type="password" id="login_pass" placeholder="••••••••">
            <button class="btn-submit" onclick="login()">Sign In</button>
            <div id="login-error" style="color: #ef4444; margin-top: 15px; display: none; font-size: 14px;">Invalid Credentials!</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display: none;">
        <h2>HM TRAVELS</h2>
        <div class="sidebar-menu">
            <a onclick="showDashboard()">Dashboard</a>
            <a onclick="showRoutes()">Manage Routes</a>
            <a onclick="showVehicles()">Manage Vehicles</a>
            <a onclick="showTrips()">Schedule Trips</a>
            <a onclick="showBookings()">View Bookings</a>
            <a onclick="showCustomers()">Manage Customers</a>
        </div>
        <a onclick="logout()" style="color: #fb7185; border-top: 1px solid rgba(255,255,255,0.1);">Logout</a>
    </div>

    <div class="main-content" id="main-content" style="display: none;">
        <div id="app-container"></div>
    </div>

    <script>
        const BASE_URL = "http://localhost:8080/api";
        const app = document.getElementById("app-container");
        let allCustomers = [];

        function checkAuth() {
            if (sessionStorage.getItem("travel_logged_in") === "true") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("sidebar").style.display = "flex";
                document.getElementById("main-content").style.display = "block";
                showDashboard();
                fetchCustomers();
            } else {
                document.getElementById("login-screen").style.display = "flex";
            }
        }

        function login() {
            if (document.getElementById("login_user").value === "admin" && document.getElementById("login_pass").value === "admin123") {
                sessionStorage.setItem("travel_logged_in", "true");
                checkAuth();
            } else { document.getElementById("login-error").style.display = "block"; }
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        window.onload = checkAuth;

        async function fetchCustomers() {
            try { allCustomers = await (await fetch(`${BASE_URL}/customers`)).json(); } catch(e) {}
        }

        function switchLocalTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function attachLiveSearch(inputId, tableBodyId, columns) {
            document.getElementById(inputId).addEventListener('keyup', function() {
                const filter = this.value.toLowerCase();
                const rows = document.getElementById(tableBodyId).getElementsByTagName('tr');
                for (let row of rows) {
                    let match = false;
                    for(let col of columns) {
                        if(row.cells[col] && row.cells[col].textContent.toLowerCase().includes(filter)) match = true;
                    }
                    row.style.display = match ? "" : "none";
                }
            });
        }

        function showDashboard() {
            app.innerHTML = `
            <div class="header"><h1>Dashboard</h1></div>
            <div style="background: white; padding: 60px 40px; border-radius: 16px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border);">
                <h2 style="color: var(--primary); margin-bottom: 10px;">Welcome back, Admin</h2>
                <p style="color: var(--text-muted); font-size: 16px;">System status is operational. Use the navigation to manage fleet and bookings.</p>
            </div>`;
        }

        // ROUTES
        async function showRoutes() {
            const data = await (await fetch(`${BASE_URL}/routes`)).json();
            app.innerHTML = `
                <div class="header"><h1>Route Management</h1></div>
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchLocalTab('dirTab', this)">Route Directory</button>
                    <button class="tab-btn" onclick="switchLocalTab('addTab', this)">+ Create New</button>
                </div>
                
                <div id="dirTab" class="tab-content active">
                    <input type="text" id="routeSearch" class="search-box" placeholder="Filter routes...">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>ID</th><th>Route Name</th><th>Departure</th><th>Destination</th><th>Base Fare</th></tr></thead>
                            <tbody id="routeTableBody">
                                ${data.map(r => `<tr><td>#${r.id}</td><td><strong>${r.routeName}</strong></td><td>${r.departureCity}</td><td>${r.destinationCity}</td><td>Rs. ${r.baseFare}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="addTab" class="tab-content">
                    <div class="form-container">
                        <h3>New Route Details</h3>
                        <label>Route Name</label><input type="text" id="r_name" placeholder="e.g. Silk Road Express">
                        <div style="display:flex; gap:15px">
                            <div style="flex:1"><label>Departure</label><input type="text" id="r_dep"></div>
                            <div style="flex:1"><label>Destination</label><input type="text" id="r_dest"></div>
                        </div>
                        <label>Base Fare (PKR)</label><input type="number" id="r_fare">
                        <button class="btn-submit" onclick="saveRoute()">Save Route</button>
                    </div>
                </div>`;
            attachLiveSearch('routeSearch', 'routeTableBody', [1, 2, 3]);
        }

        async function saveRoute() {
            const route = {
                routeName: document.getElementById("r_name").value,
                departureCity: document.getElementById("r_dep").value,
                destinationCity: document.getElementById("r_dest").value,
                baseFare: parseFloat(document.getElementById("r_fare").value)
            };
            const res = await fetch(`${BASE_URL}/routes/add`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(route) });
            if(res.ok) { alert("Route Saved!"); showRoutes(); } else { alert("Failed to save route."); }
        }

        // VEHICLES
        async function showVehicles() {
            const data = await (await fetch(`${BASE_URL}/vehicles`)).json();
            app.innerHTML = `
                <div class="header"><h1>Fleet Management</h1></div>
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchLocalTab('fleetTab', this)">Fleet Directory</button>
                    <button class="tab-btn" onclick="switchLocalTab('addTab', this)">+ Register Vehicle</button>
                </div>
                
                <div id="fleetTab" class="tab-content active">
                    <input type="text" id="vehicleSearch" class="search-box" placeholder="Search vehicles...">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>ID</th><th>Model</th><th>Reg No.</th><th>Type</th><th>Capacity</th></tr></thead>
                            <tbody id="vehicleTableBody">
                                ${data.map(v => `<tr><td>#${v.id}</td><td><strong>${v.vehicleName}</strong></td><td>${v.vehicleNo}</td><td><span class="status-badge">${v.vehicleType}</span></td><td>${v.capacity} Seats</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="addTab" class="tab-content">
                    <div class="form-container">
                        <h3>Vehicle Information</h3>
                        <label>Model Name</label><input type="text" id="v_name">
                        <label>Registration No.</label><input type="text" id="v_no">
                        <div style="display:flex; gap:15px">
                            <div style="flex:1"><label>Type</label><select id="v_type"><option value="BUS">Bus</option><option value="CAR">Car</option><option value="AEROPLANE">Aeroplane</option></select></div>
                            <div style="flex:1"><label>Capacity</label><input type="number" id="v_cap"></div>
                        </div>
                        <button class="btn-submit" onclick="saveVehicle()">Add to Fleet</button>
                    </div>
                </div>`;
            attachLiveSearch('vehicleSearch', 'vehicleTableBody', [1, 2]);
        }

        async function saveVehicle() {
            const vehicle = {
                vehicleName: document.getElementById("v_name").value,
                vehicleNo: document.getElementById("v_no").value,
                vehicleType: document.getElementById("v_type").value,
                capacity: parseInt(document.getElementById("v_cap").value)
            };
            const res = await fetch(`${BASE_URL}/vehicles/add`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(vehicle) });
            if(res.ok) { alert("Vehicle Added!"); showVehicles(); } else { alert("Error: Check Registration No."); }
        }

        // TRIPS
        async function showTrips() {
            const trips = await (await fetch(`${BASE_URL}/trips`)).json();
            const routes = await (await fetch(`${BASE_URL}/routes`)).json();
            const vehicles = await (await fetch(`${BASE_URL}/vehicles`)).json();

            app.innerHTML = `
                <div class="header"><h1>Schedules</h1></div>
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchLocalTab('tripTab', this)">Active Schedule</button>
                    <button class="tab-btn" onclick="switchLocalTab('addTab', this)">+ New Trip</button>
                </div>
                
                <div id="tripTab" class="tab-content active">
                    <input type="text" id="tripSearch" class="search-box" placeholder="Filter schedule...">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Trip ID</th><th>Route</th><th>Vehicle</th><th>Departure</th><th>Captain</th></tr></thead>
                            <tbody id="tripTableBody">
                                ${trips.map(t => `<tr><td>#${t.id}</td><td>${t.route.routeName}</td><td>${t.vehicle.vehicleName}</td><td>${new Date(t.departureTime).toLocaleString()}</td><td>${t.driverName}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="addTab" class="tab-content">
                    <div class="form-container">
                        <h3>Schedule Trip</h3>
                        <label>Select Route</label>
                        <select id="t_route"><option value="" disabled selected>Choose Route</option>${routes.map(r => `<option value="${r.id}">${r.routeName}</option>`).join('')}</select>
                        <label>Assign Vehicle</label>
                        <select id="t_veh"><option value="" disabled selected>Choose Vehicle</option>${vehicles.map(v => `<option value="${v.id}">${v.vehicleName} (${v.capacity} seats)</option>`).join('')}</select>
                        <label>Departure Date & Time</label>
                        <input type="datetime-local" id="departureInput">
                        <label>Driver Name</label>
                        <input type="text" id="t_driver">
                        <button class="btn-submit" onclick="saveTrip()">Publish Schedule</button>
                    </div>
                </div>`;
            attachLiveSearch('tripSearch', 'tripTableBody', [1, 2, 4]);
        }

        async function saveTrip() {
            const trip = {
                routeId: parseInt(document.getElementById("t_route").value),
                vehicleId: parseInt(document.getElementById("t_veh").value),
                departureTime: document.getElementById("departureInput").value + ":00", 
                driverName: document.getElementById("t_driver").value
            };
            const res = await fetch(`${BASE_URL}/trips/schedule`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(trip) });
            if(res.ok) { alert("Schedule Published!"); showTrips(); } else { alert("Error scheduling trip."); }
        }

        // CUSTOMERS
        async function showCustomers() {
            await fetchCustomers();
            app.innerHTML = `
                <div class="header"><h1>Customer Management</h1></div>
                <div class="tab-header">
                    <button class="tab-btn active" onclick="switchLocalTab('dirTab', this)">Directory</button>
                    <button class="tab-btn" onclick="switchLocalTab('regTab', this)">+ New Registration</button>
                </div>
                
                <div id="dirTab" class="tab-content active">
                    <input type="text" id="customerSearch" class="search-box" placeholder="Search customers...">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Name</th><th>CNIC</th><th>Phone</th><th>Email</th></tr></thead>
                            <tbody id="customerTableBody">
                                ${allCustomers.map(c => `<tr><td><strong>${c.firstName} ${c.lastName}</strong></td><td>${c.cnic}</td><td>${c.phone}</td><td>${c.email || '-'}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="regTab" class="tab-content">
                    <div class="form-container">
                        <h3>Registration Form</h3>
                        <div style="display:flex; gap:15px">
                            <div style="flex:1"><label>First Name</label><input type="text" id="c_fname"></div>
                            <div style="flex:1"><label>Last Name</label><input type="text" id="c_lname"></div>
                        </div>
                        <label>CNIC (13 Digits)</label><input type="text" id="c_cnic" maxlength="13">
                        <div style="display:flex; gap:15px">
                            <div style="flex:1"><label>Phone</label><input type="text" id="c_phone"></div>
                            <div style="flex:1"><label>Email</label><input type="email" id="c_email"></div>
                        </div>
                        <label>Password</label><input type="password" id="c_pass">
                        <button class="btn-submit" onclick="saveCustomer()">Register Customer</button>
                    </div>
                </div>`;
            attachLiveSearch('customerSearch', 'customerTableBody', [0, 1]);
        }

        async function saveCustomer() {
            const customer = {
                firstName: document.getElementById("c_fname").value,
                lastName: document.getElementById("c_lname").value,
                cnic: document.getElementById("c_cnic").value,
                phone: document.getElementById("c_phone").value,
                email: document.getElementById("c_email").value,
                password: document.getElementById("c_pass").value
            };
            const res = await fetch(`${BASE_URL}/customers/register`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(customer) });
            if(res.ok) { alert("Registered!"); showCustomers(); } else { alert("Failed. Email/CNIC may exist."); }
        }

        // BOOKINGS
        let selectedSeatNumber = null; 

        // 1. Show the list of all bookings (The Ledger)
        async function showBookings() {
            let bookings = [];
            try { 
                bookings = await (await fetch(`${BASE_URL}/reservations`)).json(); 
            } catch(e) { console.error("Error fetching bookings", e); }

            app.innerHTML = `
                <div class="header"><h1>Booking Ledger</h1></div>
                <div class="tab-header">
                    <button class="tab-btn active" onclick="showBookings()">View All</button>
                    <button class="tab-btn" onclick="showBookingForm()">+ New Booking</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref #</th>
                                <th>Customer</th>
                                <th>Route</th>
                                <th>Date</th>
                                <th>Seat</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerTableBody">
                            ${bookings.map(b => {
                                // DATE CHECKER LOGIC
                                const todayStr = new Date().toISOString().split('T')[0];
                                const tripDateStr = b.trip.departureTime.split('T')[0];
                                
                                // Decide whether to show the Cancel button or the "Past Trip" text
                                const actionHtml = (tripDateStr >= todayStr) 
                                    ? `<button class="btn-cancel" onclick="cancelReservation(${b.id})">Cancel</button>`
                                    : `<span style="color: #94a3b8; font-size: 12px; font-weight: 600;">Past Trip</span>`;

                                // Add the Print Button (which points to your Spring Boot Ticket URL)
                                // We use target="_blank" so it opens in a new tab nicely
                                const printHtml = `<a href="http://localhost:8080/bookings/ticket/${b.id}" class="btn-print-sm" target="_blank">Print</a>`;

                                return `
                                <tr>
                                    <td>#${b.id}</td>
                                    <td><strong>${b.customer.firstName} ${b.customer.lastName}</strong></td>
                                    <td>${b.trip.route.departureCity} ➝ ${b.trip.route.destinationCity}</td>
                                    <td>${new Date(b.trip.departureTime).toLocaleDateString()}</td>
                                    <td><span class="status-badge" style="background:#e0e7ff; color:#4338ca;">Seat ${b.seatNo}</span></td>
                                    <td><span class="status-badge">${b.bookingStatus}</span></td>
                                    
                                    <td style="white-space: nowrap;">
                                        ${printHtml} 
                                        ${actionHtml}
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }
        
        // NEW: Cancel Reservation Function
        async function cancelReservation(reservationId) {
            if (!confirm("Are you sure you want to cancel this ticket? This cannot be undone.")) {
                return; 
            }

            try {
                const res = await fetch(`${BASE_URL}/reservations/cancel/${reservationId}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    alert("Ticket successfully cancelled!");
                    showBookings(); // Seamlessly re-render the table!
                } else {
                    alert("Error: Could not cancel the ticket.");
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Network error. Make sure your Spring Boot server is running.");
            }
        }

        // 2. Show the Form with the Seat Map
        async function showBookingForm() {
            const trips = await (await fetch(`${BASE_URL}/trips`)).json();
            
            app.innerHTML = `
                <div class="header"><h1>New Booking</h1></div>
                <div class="tab-header">
                    <button class="tab-btn" onclick="showBookings()">View All</button>
                    <button class="tab-btn active" onclick="showBookingForm()">+ New Booking</button>
                </div>

                <div class="form-container" style="max-width: 600px;">
                    <h3>Book Walk-In Ticket</h3>
                    
                    <label><strong>1. Customer CNIC:</strong></label>
                    <input type="text" id="b_cnic" required pattern="[0-9]{13}" title="Enter exactly 13 digits" placeholder="13-digit CNIC (No dashes)">

                    <label><strong>2. Search Route & Date:</strong></label>
                    <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                        <input type="text" id="routeDep" placeholder="Departure City..." onkeyup="filterTrips()">
                        <input type="text" id="routeDest" placeholder="Destination City..." onkeyup="filterTrips()">
                        <input type="date" id="routeDate" onchange="filterTrips()">
                    </div>

                    <label><strong>3. Select Available Trip:</strong></label>
                    <select id="b_trip" required onchange="loadSeatMap(this)">
                        <option value="" disabled selected>-- Select a Scheduled Trip --</option>
                        ${trips.map(t => `
                            <option value="${t.id}"
                                    data-dep="${t.route.departureCity.toLowerCase()}"
                                    data-dest="${t.route.destinationCity.toLowerCase()}"
                                    data-date="${t.departureTime.split('T')[0]}"
                                    data-capacity="${t.vehicle.capacity}">
                                ${t.route.departureCity} to ${t.route.destinationCity} | ${new Date(t.departureTime).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })} | ${t.vehicle.vehicleType}
                            </option>
                        `).join('')}
                    </select>

                    <label><strong>4. Select Seat:</strong></label>
                    <div id="seat-container" class="seat-grid">
                        <p style="grid-column: span 4; text-align: center; color: var(--text-muted);">Please select a trip to view available seats.</p>
                    </div>

                    <input type="hidden" id="selectedSeatInput" required>

                    <button class="btn-submit" id="btn-confirm" onclick="saveBooking()" disabled style="width: 100%; margin-top: 10px; opacity: 0.6;">Select a Seat to Confirm</button>
                </div>`;
        }
        
        function filterTrips() {
            const depValue = document.getElementById("routeDep").value.toLowerCase();
            const destValue = document.getElementById("routeDest").value.toLowerCase();
            const dateValue = document.getElementById("routeDate").value;
            
            const tripDropdown = document.getElementById("b_trip");
            const options = tripDropdown.getElementsByTagName('option');

            tripDropdown.selectedIndex = 0;

            for (let i = 1; i < options.length; i++) {
                const optionDep = options[i].getAttribute('data-dep') || "";
                const optionDest = options[i].getAttribute('data-dest') || "";
                const optionDate = options[i].getAttribute('data-date') || "";

                const matchesDep = optionDep.includes(depValue);
                const matchesDest = optionDest.includes(destValue);
                const matchesDate = (dateValue === "" || optionDate === dateValue);

                if (matchesDep && matchesDest && matchesDate) {
                    options[i].style.display = "";
                } else {
                    options[i].style.display = "none";
                }
            }
        }

        // 3. Load Seat Map Logic
        async function loadSeatMap(selectElement) {
            const tripId = selectElement.value;
            const capacity = parseInt(selectElement.options[selectElement.selectedIndex].getAttribute('data-capacity'));
            const seatContainer = document.getElementById("seat-container");
            const btnConfirm = document.getElementById("btn-confirm");
            
            selectedSeatNumber = null; 
            btnConfirm.disabled = true;
            btnConfirm.style.opacity = "0.6";
            btnConfirm.innerText = "Select a Seat to Confirm";
            seatContainer.innerHTML = "<p style='grid-column: span 4; text-align:center;'>Loading seats...</p>";

            try {
                const reservations = await (await fetch(`${BASE_URL}/reservations/trip/${tripId}`)).json();
                const bookedSeats = reservations.map(res => res.seatNo);
                seatContainer.innerHTML = ""; 

                for (let i = 1; i <= capacity; i++) {
                    const seatDiv = document.createElement("div");
                    seatDiv.innerText = i;
                    seatDiv.id = "seat-" + i;

                    if (bookedSeats.includes(i)) {
                        seatDiv.className = "seat seat-booked";
                    } else {
                        seatDiv.className = "seat seat-available";
                        seatDiv.onclick = function() { selectSeat(i); };
                    }
                    seatContainer.appendChild(seatDiv);
                }
            } catch (error) {
                seatContainer.innerHTML = "<p style='color:red; grid-column: span 4;'>Error connecting to server.</p>";
            }
        }

        function selectSeat(seatNo) {
            document.querySelectorAll('.seat-selected').forEach(el => el.className = "seat seat-available");
            const clickedSeat = document.getElementById("seat-" + seatNo);
            clickedSeat.className = "seat seat-selected";

            selectedSeatNumber = seatNo;
            const btnConfirm = document.getElementById("btn-confirm");
            btnConfirm.disabled = false;
            btnConfirm.style.opacity = "1";
            btnConfirm.innerText = `Confirm Booking for Seat #${seatNo}`;
        }

        async function saveBooking() {
            const custCnic = document.getElementById("b_cnic").value;
            const tripId = document.getElementById("b_trip").value;

            if (!custCnic || !tripId || !selectedSeatNumber) {
                alert("Selection incomplete. Ensure CNIC, Trip, and Seat are selected.");
                return;
            }

            // Find the customer ID from the CNIC
            const customer = allCustomers.find(c => c.cnic === custCnic);
            if (!customer) {
                alert("Customer not found. Please register them first.");
                return;
            }

            const booking = {
                customerId: customer.id,
                tripId: parseInt(tripId),
                seatNo: selectedSeatNumber
            };

            const res = await fetch(`${BASE_URL}/reservations/book`, {
                method: "POST", 
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(booking)
            });

            if(res.ok) { 
                alert("Ticket Issued Successfully!"); 
                showBookings(); 
            } else { 
                alert("This seat was just taken! Please choose another."); 
                loadSeatMap(document.getElementById("b_trip"));
            }
        }
    </script>
</body>
</html>
